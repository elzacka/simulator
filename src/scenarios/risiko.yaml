scenarier:
  - id: leverandor_angrep
    navn: "Kompromittert — IT-leverandør"
    ikon: link
    kort: "Leverandør hackes — angriperen bruker deres tilgang til å stjele data og penger"
    beskrivelse: "Virksomheten har satt ut IT-drift til en ekstern leverandør uten tilstrekkelige sikkerhetskrav i kontrakten. Leverandøren blir hacket, og angriperen bruker leverandørens legitime tilgang til å kompromittere virksomhetens systemer. Dette scenariet viser hvorfor sikkerhetskrav i anskaffelser er avgjørende."
    steg:
      - tid: 0
        sys: leverandor
        status: kompromittert
        melding: "IT-leverandørens fjernstyringsverktøy er kompromittert. Angriperen har full tilgang til alle kunders systemer."
        lovkrav: "Digitalsikkerhetsforskriften § 14 — leverandøroppfølging"
      - tid: 1200
        sys: nettverk
        status: kompromittert
        melding: "Angriperen bruker leverandørens VPN-tilgang til å kartlegge virksomhetens interne nettverk."
      - tid: 2400
        sys: epost
        status: kompromittert
        melding: "Leverandørens servicekonto gir tilgang til e-postsystemet. Intern kommunikasjon overvåkes."
      - tid: 3600
        sys: fagsystem
        status: kompromittert
        melding: "Saksbehandlingssystemet med personsensitive data kompromitteres via leverandørtilgangen."
        lovkrav: "GDPR art. 32 — sikkerhet ved behandling"
      - tid: 4800
        sys: personopplysninger
        status: kompromittert
        melding: "Personopplysninger om ansatte og borgere kopieres ut av virksomheten."
        lovkrav: "GDPR art. 32 — sikkerhet ved behandling"
      - tid: 6000
        sys: okonomi
        status: manipulert
        melding: "Angriperen endrer kontonummer i fakturarutinene. Neste utbetaling på 4,2 mill. kr sendes til angriperens konto."
        lovkrav: "GDPR art. 28 — databehandleravtale"
      - tid: 7200
        sys: backup
        status: kompromittert
        melding: "Backup-løsningen krypteres med løsepengevirus. Gjenoppretting av data er umulig."
      - tid: 8400
        sys: skytjeneste
        status: nede
        melding: "Leverandørens skytjeneste stenges ned som følge av hendelsen. Alle avhengige systemer er utilgjengelige."
        lovkrav: "Digitalsikkerhetsforskriften § 8 — risikohåndtering"
    tiltak:
      forebygging:
        - "Inkluder minimumskrav til informasjonssikkerhet i alle leverandørkontrakter — ref. NSM Veileder for sikkerhet i anskaffelser."
        - "Krev MFA på alle leverandørtilganger. Begrens tilgang til spesifikke systemer, tidsrom og funksjoner (minste privilegium)."
        - "Gjennomfør leverandørvurdering og periodisk revisjon av leverandørens sikkerhetsnivå."
        - "Segmenter leverandørtilgang i eget VLAN/nettverkssone. Leverandøren skal aldri ha generell nettverkstilgang."
      respons:
        - "Frys leverandørens tilgang umiddelbart. Gjennomfør full tilgangsrevisjon for alle leverandørkontoer."
        - "Varsle Datatilsynet innen 72 timer iht. GDPR art. 33 dersom personopplysninger er berørt."
        - "Kontakt politiet ang. svindelforsøket mot kontonummer. Kontakt banken umiddelbart for å forsøke å stoppe overføringen."
        - "Varsle NSM/NCSC iht. Digitalsikkerhetsloven § 8 og digitalsikkerhetsforskriften § 17 dersom virksomheten er innenfor lovens virkeområde."

  - id: innsiderisiko
    navn: "Innsiderisiko — «Ola Nordmann»"
    ikon: person
    kort: "Ansatt med sikkerhetsklarering rekrutteres gradvis av fremmed etterretning"
    beskrivelse: "Basert på et scenario fra NSM Risiko 2026. En ansatt med sikkerhetsklarering for HEMMELIG og bred systemtilgang rekrutteres gradvis av en fremmed etterretningstjeneste — via en nær relasjon. Virksomheten mangler rutiner for å oppdage og håndtere situasjonen."
    steg:
      - tid: 0
        sys: tilgang
        status: advarsel
        melding: "«Ola» er autorisert for nivå HEMMELIG. Han har bred tilgang til fagsystemer og sensitiv informasjon."
      - tid: 1500
        sys: personopplysninger
        status: advarsel
        melding: "«Ola» blir samboer med person fra et land PST vurderer som høy etterretningstrussel. Forholdet meldes ikke til autorisasjonsansvarlig."
      - tid: 3000
        sys: epost
        status: svekket
        melding: "«Ola» introduseres for fagpersoner fra samboerens nettverk. De utveksler informasjon via privat e-post."
      - tid: 4500
        sys: fagsystem
        status: kompromittert
        melding: "«Ola» inviteres til fagsamarbeid i utlandet. Han holder foredrag om sitt arbeidsområde for et ukjent publikum."
      - tid: 6000
        sys: personopplysninger
        status: kompromittert
        melding: "«Ola» deler sensitiv informasjon med personer tilknyttet fremmed etterretning — bevisst eller under press."
        lovkrav: "Digitalsikkerhetsforskriften § 12 — personellmessige sikkerhetstiltak"
      - tid: 7500
        sys: tilgang
        status: feil
        melding: "Autorisasjonsansvarlig er aldri blitt varslet om samboerforholdet. Ingen revurdering av «Ola»s klarering er gjennomført."
        lovkrav: "Digitalsikkerhetsforskriften § 12 — personellmessige sikkerhetstiltak"
      - tid: 9000
        sys: backup
        status: svekket
        melding: "Omfanget av informasjonslekkasjen er ukjent. Det finnes ingen logging av «Ola»s tilgang til sensitiv informasjon."
        lovkrav: "Digitalsikkerhetsforskriften § 10 — teknologiske sikkerhetstiltak"
    tiltak:
      forebygging:
        - "Implementer rutiner for å melde endringer i livssituasjon til autorisasjonsansvarlig (jf. digitalsikkerhetsforskriften § 12 — personellmessige sikkerhetstiltak)."
        - "Aktiver logging og atferdsanalyse (UBA) for alle med tilgang til sensitiv informasjon. Avvik skal generere varsel."
        - "Gjennomfør regelmessige sikkerhetssamtaler med sikkerhetsklarert personell. Klarering er ikke en engangsvurdering."
        - "Bygg sikkerhetskultur der melding av bekymringsfulle forhold er normen — ikke en aksjonsbar foreteelse."
      respons:
        - "Inndra klareringen og alle systemtilganger umiddelbart. Gjennomfør forensisk gjennomgang av «Ola»s aktivitetslogger."
        - "Varsle PST og NSM. Igangsett skadeomfangsvurdering for all informasjon «Ola» har hatt tilgang til."
        - "Gjennomgå og tilstram rutiner for autorisasjonsoppfølging. Etabler prosedyre for varsling ved livsforandringer."

  - id: skytjeneste_avbrudd
    navn: "Skytjenesteavbrudd — konsentrasjonsrisiko"
    ikon: cloud
    kort: "Én utenlandsk skyleverandør svikter — hele virksomheten stopper opp"
    beskrivelse: "Virksomheten har samlet e-post, fagsystemer, backup og tilgangsstyring hos én stor utenlandsk skyleverandør. En geopolitisk hendelse fører til at tjenestene begrenses for europeiske kunder. Ingen reserveløsning finnes fordi alt ble anskaffet fra samme leverandør."
    steg:
      - tid: 0
        sys: skytjeneste
        status: nede
        melding: "Geopolitisk hendelse: Utenlandsk skyleverandør begrenser tjenester for europeiske kunder uten varsel."
      - tid: 800
        sys: epost
        status: nede
        melding: "E-post og samhandlingsverktøy er utilgjengelige. All intern og ekstern kommunikasjon stanser."
      - tid: 1600
        sys: tilgang
        status: nede
        melding: "Felles innloggingsløsning (SSO) i skyen er nede. Ingen ansatte kan logge inn på noe system."
        lovkrav: "Digitalsikkerhetsloven § 7 — sikkerhetskrav"
      - tid: 2400
        sys: fagsystem
        status: nede
        melding: "Alle fagsystemer hostet i skyen er utilgjengelige. Saksbehandling og publikumstjenester stopper."
      - tid: 3200
        sys: okonomi
        status: nede
        melding: "Lønn- og faktureringssystem er nede. Ansatte risikerer å ikke få utbetalt lønn ved neste termin."
        lovkrav: "Digitalsikkerhetsloven § 7 — sikkerhetskrav"
      - tid: 4000
        sys: backup
        status: nede
        melding: "Backup er lagret hos samme skyleverandør. Ingen data kan gjenopprettes fra alternativ kilde."
      - tid: 5000
        sys: nettverk
        status: svekket
        melding: "VPN og nettverkstjenester som er avhengige av skyen feiler. Fjernarbeid er umulig."
      - tid: 6000
        sys: fysisk
        status: svekket
        melding: "Bygningsstyring og adgangskort knyttet til skytjenesten svikter. Dører må låses opp manuelt."
        lovkrav: "Digitalsikkerhetsforskriften § 8 — risikohåndtering"
    tiltak:
      forebygging:
        - "Distribuer tjenester og data på tvers av minst to leverandører og to geografier. Unngå konsentrasjonsrisiko."
        - "Krev at backup lagres hos en annen leverandør enn primær skytjeneste, fortrinnsvis med norsk/europeisk databehandling."
        - "Etabler en offline beredskapsplan for e-post, tilgangsstyring og kritiske fagsystemer som ikke er avhengig av én skyleverandør."
        - "Gjennomfør scenariotesting for skytjenesteavbrudd som del av beredskapsøvinger (jf. Digitalsikkerhetsforskriften § 8 — risikohåndtering om kontinuitet)."
      respons:
        - "Aktiver beredskapsplan umiddelbart: alternativ kommunikasjonskanal, manuell innlogging, papirbaserte nødprosedyrer."
        - "Varsle NSM/NCSC iht. Digitalsikkerhetsloven § 8 og digitalsikkerhetsforskriften § 17 dersom virksomheten er innenfor lovens virkeområde."
        - "Initier prosess for å anskaffet alternativ eller supplerende tjenesteleverandør for kritiske funksjoner."

  - id: fysisk_brist
    navn: "Fysisk inntrengning via adgangskort"
    ikon: badge
    kort: "Synlig adgangskort kopieres — inntrenger stjeler data fra bygget"
    beskrivelse: "En ansatt bærer synlig adgangskort utenfor arbeidsplassen. Kortet fotograferes og kopieres. En inntrenger bruker det falske kortet og «tailgating» (følger tett bak en ansatt) for å komme inn i bygget. Sensitive data stjeles via USB-enhet."
    steg:
      - tid: 0
        sys: fysisk
        status: kompromittert
        melding: "Ansatt bærer synlig adgangskort på T-banen. Foto av kortets design og ID-nummer tas av ukjent person."
      - tid: 1200
        sys: tilgang
        status: kompromittert
        melding: "Falskt adgangskort produseres basert på fotografiet. Inntrengeren bruker «tailgating» ved hovedinngangen."
        lovkrav: "Digitalsikkerhetsforskriften § 11 — fysiske sikkerhetstiltak"
      - tid: 2400
        sys: fysisk
        status: svekket
        melding: "Inntrengeren beveger seg fritt i bygget. Ingen ansatte utfordrer en ukjent person uten synlig kort."
      - tid: 3600
        sys: nettverk
        status: kompromittert
        melding: "USB-enhet med skadevare kobles til en nettverkskontakt i et uovervåket møterom. Bakdør installeres."
      - tid: 4800
        sys: fagsystem
        status: kompromittert
        melding: "Via bakdøren kartlegges interne systemer. Fagsystemet med pågående anskaffelser kompromitteres."
      - tid: 6000
        sys: epost
        status: kompromittert
        melding: "Intern e-post overvåkes. Budsjettrammer og konkurransegrunnlag for pågående anskaffelser avdekkes."
        lovkrav: "GDPR art. 32 — sikkerhet ved behandling"
      - tid: 7200
        sys: personopplysninger
        status: kompromittert
        melding: "Personopplysninger og sensitiv informasjon kopieres til USB-enhet og bringes ut av bygget."
        lovkrav: "GDPR art. 32 — sikkerhet ved behandling"
    tiltak:
      forebygging:
        - "Opplær ansatte i å bære adgangskortet skjult. Kortet er ikke en del av uniformen og skal ikke vises utenfor arbeidsplassen."
        - "Installer sluseanlegg eller døralarmer mot tailgating ved alle innganger til sikrede soner."
        - "Blokker ukjente USB-enheter på alle arbeidsstasjoner via endpoint protection (f.eks. Microsoft Defender for Endpoint, Jamf)."
        - "Installer kameraovervåking i møterom, korridorer og fellesarealer med tilgang til nettverkskontakter."
      respons:
        - "Sperre adgangskortet umiddelbart og igangsette politianmeldelse."
        - "Varsle Datatilsynet innen 72 timer iht. GDPR art. 33 dersom personopplysninger er bekreftet eksponert."
        - "Gjennomfør incident response for bakdøren som ble installert — anses aktiv inntil motbevist."
        - "Kartlegg omfang via adgangskortlogger og kameraopptak. Identifiser alle rom inntrengeren besøkte."

  - id: ki_angrep
    navn: "KI-drevet angrep mot innkjøper"
    ikon: smart_toy
    kort: "Kunstig intelligens brukes til å lure innkjøpsansvarlig — deepfake og perfekt norsk"
    beskrivelse: "Trusselaktør bruker kunstig intelligens til å lage perfekt tilpassede phishing-e-poster og deepfake-videosamtaler rettet mot innkjøpsansvarlige. Angrepet utnytter tillit og rutiner i anskaffelsesprosessen for å omdirigere betalinger og stjele forretningshemmeligheter."
    steg:
      - tid: 0
        sys: epost
        status: kompromittert
        melding: "KI-generert phishing-e-post sendes til innkjøpsansvarlig. Perfekt norsk, refererer til en reell pågående anskaffelse."
      - tid: 1200
        sys: tilgang
        status: kompromittert
        melding: "Ansatt klikker lenke og oppgir pålogging. Tofaktorverifisering avlures via KI-generert telefonsamtale som ligner IT-support."
      - tid: 2400
        sys: okonomi
        status: manipulert
        melding: "Angriperen endrer leverandørens kontonummer i økonomisystemet. Neste betaling på 2,8 mill. kr sendes til feil konto."
        lovkrav: "GDPR art. 32 — sikkerhet ved behandling"
      - tid: 3600
        sys: epost
        status: svekket
        melding: "KI-deepfake videosamtale brukes til å «bekrefte» kontoendringen. Personen i videoen ligner seksjonsleder til forveksling."
      - tid: 4800
        sys: fagsystem
        status: kompromittert
        melding: "Angriperen bruker tilgangen til å kartlegge alle pågående og fremtidige anskaffelser i fagsystemet."
      - tid: 6000
        sys: personopplysninger
        status: kompromittert
        melding: "Budsjettrammer, kontraktsverdier og leverandørlister eksfiltreres. Kan brukes til fremtidige angrep."
        lovkrav: "Digitalsikkerhetsloven § 7 — sikkerhetskrav"
      - tid: 7200
        sys: nettverk
        status: kompromittert
        melding: "Vedvarende bakdør installeres i nettverket for fremtidig tilgang og overvåkning."
        lovkrav: "Digitalsikkerhetsloven § 7 — sikkerhetskrav"
    tiltak:
      forebygging:
        - "Innfør fire-øyne-prinsipp ved alle endringer av konto- og betalingsinformasjon for leverandører."
        - "Bruk dedikert betalingskanal med MFA og manuell bekreftelse via kjent telefonnummer for overføringer over en definert terskelverdi."
        - "Gjennomfør regelmessig opplæring i deepfake og sosial manipulering — spesielt for ansatte med økonomi- og anskaffelsesansvar."
        - "Innfør anti-phishing-filtrering og sandboxing av vedlegg. Sett opp DMARC, DKIM og SPF."
      respons:
        - "Kontakt banken umiddelbart for å forsøke å stoppe eller reversere overføringen."
        - "Varsle politiet og dokumenter deepfake-bevisene. NSM/NCSC varsles iht. Digitalsikkerhetsloven § 8 og digitalsikkerhetsforskriften § 17."
        - "Gjennomfør fullstendig forensisk analyse av nettverket — bakdøren er aktiv og angriper har fortsatt tilgang."
        - "Varsle Datatilsynet innen 72 timer iht. GDPR art. 33 dersom personopplysninger ble eksponert."
