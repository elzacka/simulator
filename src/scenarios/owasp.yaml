scenarier:
  - id: broken_access
    navn: "A01 — Broken Access Control"
    ikon: shield
    owasp: "A01:2025"
    kort: "IDOR vulnerability in citizen portal — unauthorized access to personal data"
    beskrivelse: "A citizen-facing portal lacks server-side authorization checks on its API. By manipulating the user ID parameter in the URL, an attacker can read and modify other citizens' applications, decisions, and personal data. The flaw exists because authorization is enforced only in the frontend, not in the backend API."
    steg:
      - tid: 0
        sys: api
        status: kompromittert
        melding: "Attacker discovers GET /api/applications/{id} returns data without authorization check. Enumerates IDs sequentially."
      - tid: 1200
        sys: database
        status: kompromittert
        melding: "Database returns application data for all citizens. No row-level security. 14,000 records exposed."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 2400
        sys: persondata
        status: kompromittert
        melding: "National ID numbers, income data, and health information exfiltrated via IDOR vulnerability."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 3600
        sys: portal
        status: manipulert
        melding: "Attacker uses PUT /api/applications/{id} to alter the status of others' applications. Decisions tampered with."
      - tid: 4800
        sys: epost
        status: svekket
        melding: "Automated email notification sends confirmation of altered application to unsuspecting citizen. Incident detected."
      - tid: 6000
        sys: logg
        status: advarsel
        melding: "Logs show 4,300 unauthorized API calls in the last 72 hours. No alert was ever triggered."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
      - tid: 7200
        sys: brannmur
        status: feil
        melding: "WAF was configured to log only, not block. Rate limiting was disabled for traffic classified as internal."
      - tid: 8400
        sys: backup
        status: svekket
        melding: "Extent of data exposure is unknown. All backups since the vulnerability was introduced must be reviewed."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
    tiltak:
      forebygging:
        - "Enforce authorization checks server-side for every API request — never rely on frontend-only enforcement."
        - "Implement row-level security in the database. No user should be able to retrieve another user's data regardless of UI logic."
        - "Use indirect references (UUIDs, opaque tokens) instead of sequential IDs in URLs."
        - "Include automated DAST testing for access control flaws as part of the CI/CD pipeline."
      respons:
        - "Disable the vulnerable API endpoint immediately. Audit logs to identify all unauthorized access."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33. Identify all affected data subjects."
        - "Notify affected individuals according to GDPR art. 34 if the breach poses high risk to their rights and freedoms."

  - id: misconfig
    navn: "A02 — Security Misconfiguration"
    ikon: settings
    owasp: "A02:2025"
    kort: "Debug mode in production — error messages expose infrastructure"
    beskrivelse: "A web application is deployed to production with debug mode enabled. Stack traces, database connection strings, and internal IP addresses are exposed in error messages. The default admin account has not been disabled. Unnecessary services and ports are open."
    steg:
      - tid: 0
        sys: webserver
        status: advarsel
        melding: "Debug mode is active in production. Detailed stack traces returned on every error response."
      - tid: 1000
        sys: api
        status: svekket
        melding: "Error message reveals database type, version, and internal IP: PostgreSQL 14.2 on 10.0.3.47."
      - tid: 2000
        sys: admin
        status: kompromittert
        melding: "Default admin account admin/admin is active. Attacker logs into the /admin panel."
      - tid: 3200
        sys: database
        status: kompromittert
        melding: "Admin panel provides direct database access. Entire user table with password hashes exported."
      - tid: 4400
        sys: persondata
        status: kompromittert
        melding: "12,500 user profiles with national ID numbers, email addresses, and home addresses downloaded."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 5600
        sys: webserver
        status: kompromittert
        melding: "Unnecessary service (phpMyAdmin) running on port 8080 without authentication. Full database access."
      - tid: 6800
        sys: logg
        status: feil
        melding: "Logging writes to a local file that rotates every 24 hours. Older logs have already been deleted."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
    tiltak:
      forebygging:
        - "Use hardened baseline configurations. Disable debug mode, stack trace output, and verbose error messages in production."
        - "Remove all default accounts and change default passwords before deployment. Automate validation in the pipeline."
        - "Run automated configuration validation (CIS Benchmarks) and port scanning in the CI/CD pipeline."
        - "Set WAF to blocking mode. Disable all services and ports not actively in use."
      respons:
        - "Disable debug mode and shut down unnecessary services immediately. Reset all compromised accounts."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33. Assume all password hashes are in the attacker's possession."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — national ID numbers and home addresses exposed constitutes high risk."
        - "Conduct a full configuration audit of all production systems."

  - id: supply_chain
    navn: "A03 — Software Supply Chain Failures"
    ikon: link
    owasp: "A03:2025"
    kort: "Compromised npm package — backdoor deployed via CI/CD pipeline"
    beskrivelse: "A popular npm package used in the organization's web application is compromised via a dependency confusion attack. Malicious code is injected in a patch update and automatically deployed through the CI/CD pipeline without manual review."
    steg:
      - tid: 0
        sys: cicd
        status: kompromittert
        melding: "npm package form-validator-utils v2.1.4 contains a backdoor. Auto-updated via Dependabot."
      - tid: 1200
        sys: webserver
        status: kompromittert
        melding: "Malicious code deployed to production via automated CI/CD pipeline. No manual code review performed."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
      - tid: 2400
        sys: portal
        status: kompromittert
        melding: "Backdoor harvests all form data (including national ID numbers) and exfiltrates to external server."
      - tid: 3600
        sys: persondata
        status: kompromittert
        melding: "Citizens' personal data exfiltrated in real time. 850 applications compromised in the first 24 hours."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 4800
        sys: api
        status: svekket
        melding: "Backdoor installs a secondary payload that maps internal API endpoints and harvests tokens."
      - tid: 6000
        sys: database
        status: advarsel
        melding: "SCA tooling (Software Composition Analysis) was not configured. No SBOM exists for the application."
      - tid: 7200
        sys: logg
        status: svekket
        melding: "Outbound traffic to unknown IP was not detected. Egress filtering was not implemented."
    tiltak:
      forebygging:
        - "Pin dependencies to specific versions with hash verification in CI/CD (lock files, npm ci)."
        - "Implement SCA tooling (Snyk, Dependabot with alerting) and generate SBOM for every build."
        - "Require manual approval for production deploys — no automatic push of dependency updates to production."
        - "Implement egress filtering: applications communicate only with known, explicitly allowed destinations."
      respons:
        - "Roll back to last known good version immediately. Isolate the compromised environment."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33 and NSM/NorCERT according to digitalsikkerhetsloven § 8."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — personal data exfiltrated in real time."
        - "Review all dependencies in the SBOM for similar backdoors. Assume all code deployed during the period is compromised."

  - id: crypto_failures
    navn: "A04 — Cryptographic Failures"
    ikon: lock
    owasp: "A04:2025"
    kort: "TLS downgrade and unencrypted backup — personal data exposed in cleartext"
    beskrivelse: "The portal supports outdated TLS versions and weak cipher suites. A MITM attacker on the network downgrades the encryption and intercepts sensitive traffic. Backups are sent unencrypted to external cloud storage, and passwords are hashed with MD5 without salt."
    steg:
      - tid: 0
        sys: webserver
        status: advarsel
        melding: "TLS 1.1 is enabled on the web server. Weak cipher suites (RC4, 3DES) available for negotiation."
      - tid: 1200
        sys: brannmur
        status: kompromittert
        melding: "Attacker performs MITM and executes TLS downgrade attack. Connection forced from TLS 1.3 to TLS 1.1."
      - tid: 2400
        sys: persondata
        status: kompromittert
        melding: "Session data and PII exposed in cleartext. National ID numbers and income data intercepted."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 3600
        sys: backup
        status: svekket
        melding: "Automated backup runs. 14 GB transferred unencrypted to cloud storage via HTTP. No server-side encryption."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 4800
        sys: database
        status: kompromittert
        melding: "Backup contains password hashes using MD5 without salt. 8,500 passwords cracked with rainbow tables in 4 hours."
      - tid: 6000
        sys: epost
        status: advarsel
        melding: "System sends decision letters with national ID numbers in cleartext via email. No TLS requirement set for mail transport."
        lovkrav: "GDPR art. 5 nr. 1 bokstav f. Integritet og konfidensialitet"
      - tid: 7200
        sys: logg
        status: feil
        melding: "Cryptographic configuration has never been tested automatically. No TLS scanning (testssl.sh, Qualys) in CI/CD pipeline."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
    tiltak:
      forebygging:
        - "Disable TLS 1.0 and 1.1 and weak cipher suites (RC4, 3DES, NULL). Allow only TLS 1.2 and 1.3."
        - "Hash passwords with bcrypt, Argon2, or PBKDF2 — never MD5 or SHA-1."
        - "Encrypt backups end-to-end with AES-256 and a managed key. Require TLS for all transfers."
        - "Run automated TLS scanning (testssl.sh, Qualys SSL Labs) in CI/CD and as part of periodic audits."
      respons:
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33. Assume all passwords in the backup are compromised."
        - "Force password reset for all affected users. Notify affected individuals according to GDPR art. 34 — passwords and PII exposed in cleartext."
        - "Encrypt existing backups retroactively or delete and rebuild with correct configuration."

  - id: injection
    navn: "A05 — Injection"
    ikon: code
    owasp: "A05:2025"
    kort: "SQL injection in search field — entire database dumped"
    beskrivelse: "The search field in a public-facing service does not validate user input. An attacker uses SQL injection to extract the entire database, including internal case worker data, before escalating to OS command execution via xp_cmdshell."
    steg:
      - tid: 0
        sys: portal
        status: kompromittert
        melding: "Attacker submits ' OR 1=1 -- in the search field. Application returns all rows in the table (45,000 records)."
      - tid: 1200
        sys: database
        status: kompromittert
        melding: "UNION SELECT reveals table structure. Attacker discovers tables: users, decisions, and documents."
      - tid: 2400
        sys: persondata
        status: kompromittert
        melding: "Users table contains national ID numbers, password hashes (MD5, unsalted), and home addresses."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 3600
        sys: admin
        status: kompromittert
        melding: "Admin password cracked (MD5: Summer2024!). Attacker logs in as system administrator."
      - tid: 4800
        sys: webserver
        status: kompromittert
        melding: "Via admin access, xp_cmdshell is enabled. Attacker now has OS-level access on the database server."
      - tid: 6000
        sys: api
        status: nede
        melding: "Attacker installs cryptominer and backdoor. Server load reaches 98%. Service unresponsive."
      - tid: 7200
        sys: brannmur
        status: svekket
        melding: "Outbound C2 traffic over port 443 blends with normal HTTPS. No deep packet inspection configured."
      - tid: 8400
        sys: logg
        status: feil
        melding: "SQL errors were logged but never monitored. 3 weeks of attack attempts went unnoticed."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
    tiltak:
      forebygging:
        - "Use prepared statements and parameterized queries consistently — never string concatenation in SQL."
        - "Validate and sanitize all user input server-side. Use an ORM with built-in escaping."
        - "Disable xp_cmdshell and all other dangerous database functions. Run the database process with least privilege."
        - "Set up SIEM alerts on SQL error patterns (syntax errors, UNION SELECT, xp_). Never leave error logs unmonitored."
      respons:
        - "Shut down the search function immediately. Assume all data in the database is exposed and compromised."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33. Force password reset for all users."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — national ID numbers and passwords compromised."
        - "Conduct full forensic analysis — cryptominer and backdoor are installed and active on the server."

  - id: insecure_design
    navn: "A06 — Insecure Design"
    ikon: design_services
    owasp: "A06:2025"
    kort: "Password reset with sequential tokens — no identity verification by design"
    beskrivelse: "The password reset function was designed without security requirements. Tokens are sequential integers, not cryptographically random strings. The function can be used to enumerate users and reset others' passwords. Rate limiting and notification to the account holder were never considered in the design phase."
    steg:
      - tid: 0
        sys: portal
        status: kompromittert
        melding: "Attacker discovers reset URL uses /reset?token=4821. Enumeration of adjacent tokens begins."
      - tid: 1200
        sys: epost
        status: kompromittert
        melding: "Token is a 6-digit sequential integer. With botnet: 1 million attempts in 8 hours. No rate limiting."
      - tid: 2400
        sys: admin
        status: kompromittert
        melding: "Admin account is reset. No notification sent to the registered email address. Attacker sets new password."
      - tid: 3600
        sys: persondata
        status: kompromittert
        melding: "Admin access used to export all user profiles — 6,200 citizens with names, addresses, and case status."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 4800
        sys: api
        status: svekket
        melding: "Reset endpoint returns different responses for existing vs. non-existing emails. All accounts can be enumerated."
      - tid: 6000
        sys: logg
        status: feil
        melding: "50,000 reset attempts in the last 48 hours are logged, but no alert is defined. Logs never reviewed."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
      - tid: 7200
        sys: brannmur
        status: svekket
        melding: "Rate limiting was not planned in the design phase. Cannot be implemented without a full rewrite of the authentication module."
    tiltak:
      forebygging:
        - "Integrate threat modeling (STRIDE) in the design phase — security requirements must come from the threat model, not be added as an afterthought."
        - "Use cryptographically random tokens (UUID v4 or minimum 128 bits of entropy) for all one-time codes and reset links."
        - "Always send a notification to the registered email address on any account change or password reset attempt."
        - "Rate limit all authentication-related endpoints from day one — this is a design requirement, not an operational configuration."
      respons:
        - "Invalidate all active reset tokens immediately."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — 6,200 citizen profiles with personal data exposed."
        - "Plan full rewrite of the password reset module. Security review of all authentication code."

  - id: auth_failure
    navn: "A07 — Authentication Failures"
    ikon: passkey
    owasp: "A07:2025"
    kort: "Credential stuffing against employee portal — no MFA, no rate limiting"
    beskrivelse: "An employee portal with VPN access lacks multi-factor authentication and rate limiting. An attacker uses leaked username/password pairs from a previous breach to systematically log in as employees. Session IDs are predictable and not invalidated on password change."
    steg:
      - tid: 0
        sys: portal
        status: advarsel
        melding: "Automated credential stuffing begins. 200 login attempts per minute. No rate limiting."
      - tid: 1200
        sys: admin
        status: kompromittert
        melding: "5 of 200 credential pairs succeed. Employee with case worker role compromised. No MFA."
      - tid: 2400
        sys: epost
        status: kompromittert
        melding: "Attacker reads employee email via SSO token. Internal communications about ongoing procurement discovered."
      - tid: 3600
        sys: api
        status: kompromittert
        melding: "API token is a predictable JWT with no expiration. Token remains valid even after the employee changes password."
      - tid: 4800
        sys: persondata
        status: kompromittert
        melding: "Case worker access used to export personal data of 2,300 citizens."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 6000
        sys: database
        status: svekket
        melding: "Session IDs are sequential (1001, 1002, 1003...). Attacker hijacks 12 active sessions."
      - tid: 7200
        sys: logg
        status: feil
        melding: "Failed login attempts are logged, but no alert is triggered. Alert threshold set to 10,000."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
    tiltak:
      forebygging:
        - "Require MFA for all accounts — mandatory for VPN, admin panel, and all accounts with access to personal data."
        - "Implement rate limiting and automatic account lockout after 5–10 failed attempts. Notify the user on lockout."
        - "Use JWTs with short lifetimes (15–60 min) and invalidate all tokens on password change or logout."
        - "Check passwords against known breached databases (HaveIBeenPwned API) on creation and change."
      respons:
        - "Invalidate all active sessions and session IDs immediately. Force password change for all affected accounts."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33. Notify affected individuals according to GDPR art. 34."
        - "Conduct access audit — map what the compromised accounts accessed and exported."

  - id: integrity_failures
    navn: "A08 — Software and Data Integrity Failures"
    ikon: security
    owasp: "A08:2025"
    kort: "Insecure deserialization in API — arbitrary code execution via crafted object"
    beskrivelse: "The REST API accepts Java-serialized objects without validating content or source. An attacker sends a crafted object with a gadget chain targeting an outdated deserialization library. The code executes with the application server's privileges. The CI/CD pipeline lacks signing of deployment artifacts."
    steg:
      - tid: 0
        sys: api
        status: kompromittert
        melding: "Attacker sends crafted Java-serialized object to /api/import. Content-Type: application/x-java-serialized-object accepted."
      - tid: 1200
        sys: webserver
        status: kompromittert
        melding: "Apache Commons Collections (v3.1) deserializes the object. Gadget chain executes. Arbitrary OS command runs on the server."
      - tid: 2400
        sys: admin
        status: kompromittert
        melding: "Reverse shell established with the application server's service account privileges. Lateral movement begins."
      - tid: 3600
        sys: database
        status: kompromittert
        melding: "Direct database access via service account. Tables decisions and users dumped — 9,200 rows."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 4800
        sys: cicd
        status: svekket
        melding: "No digital signing of deployment artifacts. Attacker injects modified JAR into next scheduled deploy."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
      - tid: 6000
        sys: logg
        status: svekket
        melding: "Exception logging for deserialization is disabled to reduce noise. No trace of the execution in logs."
      - tid: 7200
        sys: backup
        status: advarsel
        melding: "On rollback, compromised code is redeployed from backup. No integrity check on backup artifacts."
    tiltak:
      forebygging:
        - "Never deserialize untrusted data. Replace binary Java serialization with JSON, XML with schema validation, or Protobuf."
        - "Update all third-party libraries regularly. Monitor CVE alerts for critical dependencies (Apache Commons, Xstream)."
        - "Digitally sign all deployment artifacts with a controlled key. Verify signatures automatically in CI/CD."
        - "Enable logging and alerting on unexpected class instantiations and reflection calls in the application."
      respons:
        - "Shut down the exposed API endpoint immediately. Rebuild the application server from a known clean baseline — not from backup."
        - "Conduct full forensic analysis. Attacker has persistent remote access via reverse shell."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33 and NSM/NorCERT according to digitalsikkerhetsloven § 8."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — 9,200 user records including decision data compromised."

  - id: logging_failures
    navn: "A09 — Security Logging and Monitoring Failures"
    ikon: manage_search
    owasp: "A09:2025"
    kort: "Undetected breach for 11 weeks — SIEM without rules, logs without an owner"
    beskrivelse: "SIEM is installed, but no correlation rules are configured and no one owns the log monitoring function. The attacker moves laterally for 11 weeks without anyone reacting. The breach is discovered only when ransomware is deployed and services go down — not by the security monitoring."
    steg:
      - tid: 0
        sys: logg
        status: advarsel
        melding: "SIEM is installed, but no correlation rules configured. Logs are collected. No alerts defined. No owner assigned."
      - tid: 1200
        sys: portal
        status: kompromittert
        melding: "Attacker exploits known vulnerability. Error codes and anomalous traffic are clearly visible in logs. Nobody monitors."
      - tid: 2400
        sys: api
        status: svekket
        melding: "Lateral movement over 3 weeks. Log volume is 2 GB per day — too high for manual review without automated rules."
      - tid: 3600
        sys: database
        status: kompromittert
        melding: "45 GB of data exfiltrated over 6 weeks to external server. No egress alarm configured on firewall or SIEM."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 4800
        sys: admin
        status: kompromittert
        melding: "Attacker creates hidden admin user. No alert triggered on creation of privileged account."
        lovkrav: "Digitalsikkerhetsloven § 7. Krav om sikkerhet for tilbydere av samfunnsviktige tjenester"
      - tid: 6000
        sys: backup
        status: kompromittert
        melding: "Backup system silently infected. Shadow copies deleted. Ability to restore data eliminated."
      - tid: 7200
        sys: logg
        status: nede
        melding: "Ransomware deployed. Services go down. Breach discovered — 11 weeks after initial compromise."
        lovkrav: "Digitalsikkerhetsforskriften § 13. Hendelseshåndtering og beredskap"
      - tid: 8400
        sys: brannmur
        status: feil
        melding: "Post-mortem: 847 unique IOCs were present in the logs. All missed. SIEM rules were never configured after installation."
        lovkrav: "Digitalsikkerhetsloven § 8. Krav om varsling for tilbydere av samfunnsviktige tjenester"
    tiltak:
      forebygging:
        - "Configure SIEM with correlation rules from day one: lateral movement, privilege escalation, bulk data exfiltration, new admin accounts."
        - "Assign a named owner for log monitoring with defined escalation responsibilities and periodic review."
        - "Set up egress alarms for unusually large data transfers (volume and destination) and alerts on creation of privileged accounts."
        - "Conduct quarterly tabletop exercises to verify that alerts, escalation, and response plans actually work."
      respons:
        - "Activate incident response immediately. Ransomware requires full isolation of affected systems."
        - "Notify the supervisory authority within 72 hours according to GDPR art. 33 and NSM/NorCERT according to digitalsikkerhetsloven § 8."
        - "Notify affected individuals without undue delay according to GDPR art. 34 — 45 GB of personal data exfiltrated over 6 weeks."
        - "Assess whether recovery from offline backup or external backup outside the primary provider is possible."

  - id: exceptional_conditions
    navn: "A10 — Mishandling of Exceptional Conditions"
    ikon: warning
    owasp: "A10:2025"
    kort: "Race condition in application processing — approvals granted without review"
    beskrivelse: "The application API lacks locking mechanisms on critical operations. An attacker sends concurrent requests and exploits a race condition to get applications approved without passing through the review queue. The exception handling is not designed for concurrent failures — stack traces are exposed and thread pool exhaustion blocks legitimate users."
    steg:
      - tid: 0
        sys: api
        status: advarsel
        melding: "Application API lacks optimistic locking (ETag/version number) and database transaction locks on status changes."
      - tid: 1200
        sys: portal
        status: kompromittert
        melding: "Attacker sends 50 concurrent PUT requests to the same application. Race condition triggered between status check and status update."
      - tid: 2400
        sys: database
        status: kompromittert
        melding: "Two transactions complete in parallel in wrong order (TOCTOU). Application set to approved without passing review queue."
        lovkrav: "GDPR art. 32. Sikkerhet ved behandlingen"
      - tid: 3600
        sys: admin
        status: svekket
